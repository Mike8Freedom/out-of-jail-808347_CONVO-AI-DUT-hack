<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Белый Аист — M1</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #1a1919;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Unbounded', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Phone frame */
    .phone {
      width: 390px;
      height: 844px;
      position: relative;
      overflow: hidden;
      background: #3E3D3D;
      border-radius: 40px;
      box-shadow: 0 40px 120px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06);
    }

    /* ── BACKGROUND PHOTO ── */
    .bg-photo {
      position: absolute;
      /* offset left like in Figma: the group starts at x=-126, photo at x=123 within group → net x=-3 */
      left: -3px; top: 9px;
      width: 410px; height: 749px;
      border-radius: 77px;
      overflow: hidden;
      z-index: 0;
    }
    .bg-photo img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
    }

    /* gradient overlay */
    .bg-overlay {
      position: absolute;
      left: -35px; top: 0;
      width: 442px; height: 758px;
      background: linear-gradient(180deg, rgba(52,51,51,0.36) 10.82%, rgba(26,25,25,0.51) 102.3%);
      z-index: 1;
    }

    /* ── RATING BADGE ── */
    .rating {
      position: absolute;
      left: 24px; top: 27px;
      z-index: 10;
      display: flex; align-items: center; gap: 6px;
      /* white background behind 4.9 */
    }
    .rating__num-bg {
      background: #fff;
      border-radius: 37px;
      padding: 5px 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .rating__num {
      font-size: 22px; font-weight: 400; letter-spacing: -0.22px;
      color: #010000; line-height: 1;
    }
    .rating__img {
      height: 41px; width: 89px;
      object-fit: cover; border-radius: 8px;
    }

    /* ── АПГРЕЙД (with border) ── */
    .apgrade-wrap {
      position: absolute;
      /* in Figma: border rect left=33 top=111, text left=58 top=116 */
      left: 33px; top: 111px;
      width: 358px; height: 64px;
      z-index: 5;
    }
    /* gradient border using outline trick */
    .apgrade-border {
      position: absolute; inset: 0;
      border-radius: 37px;
      background: linear-gradient(#3E3D3D, #3E3D3D) padding-box,
                  linear-gradient(90deg, #FA6A00, #94E9F8) border-box;
      border: 3px solid transparent;
      background-color: rgba(41,41,41,0.13);
    }
    .apgrade-text {
      position: absolute;
      left: 25px; top: 50%;
      transform: translateY(-50%);
      font-size: 43px; font-weight: 300;
      letter-spacing: 9.89px;
      color: #fff;
      line-height: 1;
      white-space: nowrap;
    }

    /* ── ПРОДУКТИВНОСТИ ── */
    .productivity {
      position: absolute;
      left: 7px; top: 198px;
      width: 430px;
      font-size: 31px; font-weight: 400; letter-spacing: -0.31px;
      line-height: normal;
      background: linear-gradient(90deg, #fff 24.038%, #5CDCD2 65.865%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      z-index: 5;
    }

    /* ── а не отпуск ── */
    .a-ne {
      position: absolute;
      left: 169px; top: 244px;
      font-size: 31px; font-weight: 400;
      line-height: normal; z-index: 5;
    }
    .a-ne__plain { color: #fff; }
    .a-ne__grad {
      background: linear-gradient(90deg, #EAFBFA 0%, #E59914 57.692%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ── CHARACTER ── */
    .char-wrap {
      position: absolute;
      left: -55px; top: 267px;
      width: 256px; height: 192px;
      z-index: 4;
      transform: rotate(-9.85deg);
    }
    .char-shadow {
      position: absolute;
      left: -71px; top: 21px;
      width: 326px; height: 195px;
      background: rgba(13,13,13,0.27);
      border-radius: 50%;
      transform: rotate(8.05deg) skewX(2.05deg);
    }
    .char-img {
      width: 232px; height: 155px;
      border-radius: 101.5px;
      object-fit: cover; object-position: top center;
      opacity: 0.89;
      position: relative; z-index: 1;
    }

    /* ── PILL TAGS ── */
    /* each pill has dark semi-transparent bg + gradient border */
    .tags {
      position: absolute;
      left: 9px; top: 420px;
      z-index: 6;
      display: flex; flex-direction: column;
      gap: 4px;
    }

    .tag {
      display: inline-flex; align-items: center;
      height: 29px; padding: 0 16px;
      border-radius: 100px;
      font-size: 21px; font-weight: 300; letter-spacing: -0.21px;
      white-space: nowrap;
      position: relative;
      transform: rotate(-0.71deg);
    }

    /* перезагрузка — green border */
    .tag--reload {
      background: rgba(41,41,41,0.98);
      border: 3px solid transparent;
      background-clip: padding-box;
      box-shadow: 0 0 0 3px #5FC52F;
      color: transparent;
      background-image: linear-gradient(180deg, #fff 12.5%, #ECF6FF 48.558%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* закончить спринт — orange→teal border */
    .tag--sprint {
      background: rgba(41,41,41,0.43);
      border: 3px solid transparent;
      box-shadow: 0 0 0 0px transparent;
      outline: 3px solid #FA6A00;
      /* gradient border hack */
      background-clip: padding-box;
    }

    /* гулять по горам — gradient text, no pill bg */
    .tag--walk {
      background: none; border: none; outline: none; box-shadow: none;
      background: rgba(41,41,41,0.43);
      border: 3px solid #FA6A00;
    }

    /* сбежать из города — orange→pink border */
    .tag--flee {
      background: rgba(41,41,41,0.43);
      border: 3px solid #FA6A00;
    }

    /* Proper gradient border implementation */
    .pill {
      display: inline-block;
      padding: 5px 16px;
      border-radius: 100px;
      font-size: 21px; font-weight: 300; letter-spacing: -0.21px;
      white-space: nowrap;
      transform: rotate(-0.71deg);
      position: relative;
    }
    .pill::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 100px;
      padding: 3px;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    .pill-reload {
      background: rgba(41,41,41,0.98);
      margin-top: 4px;
    }
    .pill-reload::before {
      background: linear-gradient(90deg, #5FC52F, #94E9F8);
    }
    .pill-reload span {
      background: linear-gradient(180deg, #fff 12.5%, #ECF6FF 48.558%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .pill-sprint {
      background: rgba(41,41,41,0.13);
      margin-top: 2px;
    }
    .pill-sprint::before {
      background: linear-gradient(90deg, #FA6A00, #94E9F8);
    }
    .pill-sprint span {
      background: linear-gradient(180deg, #fff 12.5%, #ECF6FF 48.558%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .pill-walk {
      background: rgba(41,41,41,0.43);
      margin-top: 2px;
    }
    .pill-walk::before {
      background: linear-gradient(90deg, #FA6A00, #94E9F8);
    }
    .pill-walk span {
      background: linear-gradient(90deg, #fff 0%, #5CDCD2 35.096%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      font-weight: 400;
    }

    .pill-flee {
      background: rgba(41,41,41,0.43);
      margin-top: 2px;
    }
    .pill-flee::before {
      background: linear-gradient(90deg, #FA6A00, #E55D74);
    }
    .pill-flee span {
      background: linear-gradient(180deg, #fff 12.5%, #ECF6FF 48.558%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ── ALPS ICON ── */
    .alps-icon {
      position: absolute;
      left: 147px; top: 573px;
      width: 60px; height: 60px;
      z-index: 6;
      object-fit: contain;
    }

    /* ── CTA BUTTON ── */
    .cta-wrap {
      position: absolute;
      left: 41px; top: 645px;
      width: 342px; height: 82px;
      z-index: 8;
    }
    .cta-bg {
      position: absolute; inset: 0;
      background: rgba(243,168,27,0.86);
      border-radius: 37px;
      box-shadow: 0px 4px 34px 9px rgba(0,0,0,0.25);
    }
    .cta-main {
      position: absolute;
      left: 0; right: 0; top: 13px;
      text-align: center;
      font-size: 24px; font-weight: 500; letter-spacing: -0.24px;
      color: #000; line-height: 1;
    }
    .cta-sub {
      position: absolute;
      left: 0; right: 0; top: 47px;
      text-align: center;
      font-size: 16px; font-weight: 300; letter-spacing: -0.16px;
      color: #000; line-height: 1;
    }
    /* gift icon inside cta */
    .cta-gift {
      position: absolute;
      /* in figma: gift at x=270 top=690, cta at top=645 → relative top=45 */
      right: 16px; top: 46px;
      width: 28px; height: 14px;
      object-fit: contain;
    }

    /* ── BOTTOM TEXT ── */
    .bottom-text {
      position: absolute;
      left: 10px; top: 760px;
      z-index: 8;
    }
    .bottom-main {
      font-size: 31px; font-weight: 400; letter-spacing: -0.31px;
      background: linear-gradient(90deg, rgba(243,168,27,0.86) 24.038%, #5CDCD2 65.865%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: normal;
    }
    .bottom-sub {
      font-size: 19px; font-weight: 400; letter-spacing: -0.19px;
      background: linear-gradient(90deg, rgba(243,168,27,0.86) 24.038%, #5CDCD2 65.865%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-top: 2px;
      padding-left: 115px;
    }

    /* ── ANIMATIONS ── */
    .phone * { animation-fill-mode: both; }

    .bg-photo   { animation: fadeIn .8s ease .1s both; }
    .rating     { animation: fadeDown .6s cubic-bezier(.34,1.56,.64,1) .3s both; }
    .apgrade-wrap { animation: fadeUp .7s cubic-bezier(.34,1.56,.64,1) .45s both; }
    .productivity { animation: fadeUp .7s ease .55s both; }
    .a-ne       { animation: fadeUp .7s ease .65s both; }
    .char-wrap  { animation: charSlide 1s cubic-bezier(.34,1.56,.64,1) .5s both; }
    .tags       { animation: fadeUp .8s ease .75s both; }
    .alps-icon  { animation: fadeIn .6s ease .9s both; }
    .cta-wrap   { animation: ctaIn .8s cubic-bezier(.34,1.56,.64,1) 1s both; }
    .bottom-text{ animation: fadeUp .7s ease 1.1s both; }

    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:none} }
    @keyframes charSlide { from{opacity:0;transform:rotate(-9.85deg) translateX(-30px)} to{opacity:1;transform:rotate(-9.85deg)} }
    @keyframes ctaIn { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }

    /* subtle hover on CTA */
    .cta-wrap { cursor: pointer; transition: transform .3s; }
    .cta-wrap:hover { transform: scale(1.02); }

    /* On small screens, scale phone to fit */
    @media (max-height: 880px) {
      .phone { transform: scale(0.85); transform-origin: top center; }
      body { align-items: flex-start; padding-top: 20px; }
    }
    @media (max-height: 740px) {
      .phone { transform: scale(0.72); }
    }
  </style>
</head>
<body>

<div class="phone">

  <!-- BG PHOTO -->
  <div class="bg-photo">
    <img src="images/m1-bg.png" alt="">
  </div>
  <div class="bg-overlay"></div>

  <!-- RATING BADGE -->
  <div class="rating">
    <div class="rating__num-bg">
      <span class="rating__num">4.9</span>
      <img class="rating__img" src="images/m1-rating.png" alt="Яндекс Путешествия">
    </div>
  </div>

  <!-- АПГРЕЙД -->
  <div class="apgrade-wrap">
    <div class="apgrade-border"></div>
    <span class="apgrade-text">АПГРЕЙД</span>
  </div>

  <!-- ПРОДУКТИВНОСТИ -->
  <p class="productivity">ПРОДУКТИВНОСТИ</p>

  <!-- а не отпуск -->
  <p class="a-ne">
    <span class="a-ne__plain">а не </span><span class="a-ne__grad">отпуск</span>
  </p>

  <!-- CHARACTER -->
  <div class="char-wrap">
    <div class="char-shadow"></div>
    <img class="char-img" src="images/m1-char.png" alt="">
  </div>

  <!-- PILL TAGS -->
  <div class="tags">
    <span class="pill pill-reload"><span>перезагрузка</span></span>
    <span class="pill pill-sprint"><span>закончить спринт</span></span>
    <span class="pill pill-walk"><span>гулять по горам</span></span>
    <span class="pill pill-flee"><span>сбежать из города</span></span>
  </div>

  <!-- ALPS ICON -->
  <img class="alps-icon" src="images/m1-alps.png" alt="">

  <!-- CTA -->
  <a class="cta-wrap" href="https://travel.yandex.ru/hotels/altai-krai/belyi-aist/" target="_blank">
    <div class="cta-bg"></div>
    <span class="cta-main">забронировать пн-чт</span>
    <span class="cta-sub">( баня в подарок &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;)</span>
    <img class="cta-gift" src="images/m1-gift.png" alt="🎁">
  </a>

  <!-- BOTTOM TEXT -->
  <div class="bottom-text">
    <p class="bottom-main">Это место для тебя</p>
    <p class="bottom-sub">потому что</p>
  </div>

</div>

</body>
</html>
